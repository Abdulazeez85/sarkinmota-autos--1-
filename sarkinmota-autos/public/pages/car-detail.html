  <style>
    .detail-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: var(--space-12); align-items: start; padding: var(--space-12) 0; }
    .gallery { position: sticky; top: 100px; }
    .gallery-main { aspect-ratio: 16/10; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; margin-bottom: var(--space-3); cursor: zoom-in; }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .gallery-main:hover img { transform: scale(1.03); }
    .gallery-thumbs { display: flex; gap: var(--space-2); overflow-x: auto; padding-bottom: var(--space-2); }
    .gallery-thumb { width: 80px; height: 56px; flex-shrink: 0; background: var(--bg-card); border: 2px solid var(--border-color); border-radius: var(--radius-sm); overflow: hidden; cursor: pointer; transition: border-color var(--ease-fast); }
    .gallery-thumb:hover, .gallery-thumb.active { border-color: var(--gold-mid); }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .detail-header { margin-bottom: var(--space-6); }
    .detail-brand { font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-gold); margin-bottom: var(--space-2); }
    .detail-name { font-size: clamp(var(--text-3xl), 4vw, var(--text-5xl)); font-weight: 900; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.05; margin-bottom: var(--space-4); }
    .detail-badges { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-5); }
    .detail-price-block { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-5); margin-bottom: var(--space-6); }
    .detail-price-label { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--space-2); }
    .detail-price-ngn { font-family: var(--font-display); font-size: var(--text-4xl); font-weight: 900; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.1; }
    .detail-price-usd { font-size: var(--text-base); color: var(--text-muted); margin-top: var(--space-1); }
    .detail-meta-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3); margin-bottom: var(--space-6); }
    .detail-meta-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: var(--space-3) var(--space-4); }
    .detail-meta-label { font-family: var(--font-display); font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .detail-meta-val { font-family: var(--font-display); font-size: var(--text-base); font-weight: 700; color: var(--text-primary); }
    .detail-actions { display: flex; flex-direction: column; gap: var(--space-3); margin-bottom: var(--space-6); }
    .detail-actions-row { display: flex; gap: var(--space-3); }
    .detail-actions-row .btn { flex: 1; }
    .detail-tabs { border-bottom: 1px solid var(--border-color); display: flex; gap: var(--space-1); margin-bottom: var(--space-8); }
    .detail-tab { font-family: var(--font-display); font-size: var(--text-sm); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: var(--space-3) var(--space-4); color: var(--text-muted); border-bottom: 2px solid transparent; cursor: pointer; transition: all var(--ease-fast); margin-bottom: -1px; }
    .detail-tab:hover { color: var(--text-secondary); }
    .detail-tab.active { color: var(--text-gold); border-bottom-color: var(--gold-mid); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .specs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-3); }
    .spec-row { display: flex; justify-content: space-between; align-items: center; padding: var(--space-3) 0; border-bottom: 1px solid var(--divider); }
    .spec-key { font-size: var(--text-sm); color: var(--text-secondary); }
    .spec-val { font-family: var(--font-display); font-weight: 700; font-size: var(--text-sm); color: var(--text-primary); }
    .features-list { display: flex; flex-wrap: wrap; gap: var(--space-3); }
    .feature-tag { display: inline-flex; align-items: center; gap: var(--space-2); background: rgba(201,168,76,0.08); border: 1px solid var(--border-color); color: var(--text-secondary); padding: var(--space-2) var(--space-4); border-radius: var(--radius-sm); font-size: var(--text-sm); }
    .feature-tag::before { content: '✓'; color: var(--gold-mid); }
    .enquiry-block { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: var(--space-6); }
    .enquiry-title { font-family: var(--font-display); font-size: var(--text-xl); font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--space-5); }
    @media (max-width: 1024px) { .detail-grid { grid-template-columns: 1fr; } .gallery { position: static; } }
    @media (max-width: 768px) { .detail-meta-grid { grid-template-columns: 1fr; } .detail-actions-row { flex-direction: column; } }
  </style>
</head>
