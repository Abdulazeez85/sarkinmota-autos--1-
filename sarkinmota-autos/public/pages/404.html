<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Sarkinmota Autos</title>
  <link rel="stylesheet" href="/css/root.css"><link rel="stylesheet" href="/css/reset.css"><link rel="stylesheet" href="/css/components.css"><link rel="stylesheet" href="/css/navbar.css"><link rel="stylesheet" href="/css/animations.css"><link rel="stylesheet" href="/css/responsive.css">
  <style>
    .notfound { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: var(--space-8); position: relative; overflow: hidden; }
    .notfound-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 65%); pointer-events: none; }
    .notfound-num { font-family: var(--font-display); font-size: clamp(120px, 20vw, 240px); font-weight: 900; line-height: 1; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; opacity: 0.3; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); pointer-events: none; letter-spacing: -0.05em; }
    .notfound-content { position: relative; z-index: 1; max-width: 600px; }
    .notfound-icon { font-size: 56px; margin-bottom: var(--space-5); display: block; }
    .notfound-title { font-family: var(--font-display); font-size: clamp(var(--text-3xl), 5vw, var(--text-5xl)); font-weight: 900; text-transform: uppercase; letter-spacing: 0.02em; margin-bottom: var(--space-4); }
    .notfound-sub { color: var(--text-secondary); font-size: var(--text-lg); line-height: 1.7; margin-bottom: var(--space-8); }
    .notfound-actions { display: flex; gap: var(--space-4); justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
<div class="notfound">
  <div class="notfound-bg"></div>
  <div class="notfound-num">404</div>
  <div class="notfound-content">
    <span class="notfound-icon">🚗</span>
    <h1 class="notfound-title">This Road Leads <span style="background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Nowhere</span></h1>
    <p class="notfound-sub">The page you are looking for doesn't exist or has been moved. Let's get you back on track, my bratha.</p>
    <div class="notfound-actions">
      <a href="/" class="btn btn-primary btn-lg">Back to Homepage</a>
      <a href="/pages/inventory.html" class="btn btn-outline btn-lg">Browse Inventory</a>
      <a href="https://wa.me/2347015136111" target="_blank" class="btn btn-whatsapp btn-lg">WhatsApp Us</a>
    </div>
  </div>
</div>
<script src="/js/theme.js"></script>
</body></html>
