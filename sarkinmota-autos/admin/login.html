<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Sarkinmota Autos</title>
  <link rel="stylesheet" href="/admin/css/admin-root.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary); position: relative; overflow: hidden; }
    body::before { content: ''; position: absolute; top: -200px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 65%); pointer-events: none; }
    .login-card { width: 100%; max-width: 400px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; padding: 40px; position: relative; z-index: 1; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo img { height: 52px; margin-bottom: 12px; }
    .login-brand { font-family: var(--font-display); font-size: 22px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
    .login-sub { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-gold); margin-top: 4px; }
    .login-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); text-align: center; margin-bottom: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-label { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
    .form-input { background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-primary); padding: 11px 14px; font-size: 14px; border-radius: 2px; width: 100%; transition: border-color 0.15s; }
    .form-input:focus { border-color: var(--gold-mid); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); outline: none; }
    .form-input::placeholder { color: var(--text-muted); }
    .login-btn { width: 100%; padding: 12px; background: var(--gold-gradient); color: #000; font-family: var(--font-display); font-size: 13px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; border: none; border-radius: 2px; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(201,168,76,0.35); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .login-error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: #EF4444; padding: 10px 14px; border-radius: 2px; font-size: 12px; margin-bottom: 16px; display: none; }
    .login-footer { text-align: center; margin-top: 20px; font-size: 11px; color: var(--text-muted); }
    .login-footer a { color: var(--text-gold); }
    .gold-line { height: 2px; background: var(--gold-gradient); border-radius: 1px; margin-bottom: 24px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <img src="/assets/images/logo/logo-dark.png" alt="Sarkinmota Autos" onerror="this.style.display='none'">
    <div class="login-brand">Sarkinmota Autos</div>
    <div class="login-sub">Admin Portal</div>
  </div>
  <div class="gold-line"></div>
  <div class="login-title">🔒 Secure Access</div>
  <div class="login-error" id="loginError">Invalid username or password. Please try again.</div>
  <form id="loginForm">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-input" id="loginUser" placeholder="Enter username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="loginPass" placeholder="Enter password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-btn" id="loginBtn">Sign In to Dashboard</button>
  </form>
  <div class="login-footer"><a href="/">← Back to Website</a></div>
</div>
<script>
  // Redirect if already logged in
  if (localStorage.getItem('sarkinmota_admin_token')) {
    window.location.href = '/admin/pages/dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');
    const user = document.getElementById('loginUser').value;
    const pass = document.getElementById('loginPass').value;
    btn.disabled = true; btn.textContent = 'Signing In...';
    errEl.style.display = 'none';
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (data.success && data.token) {
        localStorage.setItem('sarkinmota_admin_token', data.token);
        localStorage.setItem('sarkinmota_admin_user', user);
        window.location.href = '/admin/pages/dashboard.html';
      } else {
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In to Dashboard';
      }
    } catch {
      errEl.textContent = 'Server error. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In to Dashboard';
    }
  });
</script>
</body>
</html>
